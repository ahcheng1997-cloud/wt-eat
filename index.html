<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<style>
*{box-sizing:border-box;}
body {font-family:"Noto Sans TC", Arial; margin:0; background:linear-gradient(135deg,#f5f5f5,#e0e0e0); padding-bottom:120px;}    
header {position:relative; background:linear-gradient(135deg,#2e7d32,#66bb6a); color:white; padding:30px; text-align:center; font-size:1.5em;}
.version {position:absolute; right:10px; bottom:8px; font-size:0.8em;}
main {display:flex; justify-content:center; padding:20px;}
.container {display:flex; flex-direction:column; gap:20px; width:100%; max-width:1100px;}
.main-btn {font-size:1.2em; padding:15px; border:none; border-radius:15px; background:#d32f2f; color:white; cursor:pointer;}
.menu {display:none; background:white; border-radius:15px; padding:20px; box-shadow:0 6px 15px rgba(0,0,0,0.2);}    
.order {position:fixed; bottom:0; left:0; width:100%; background:white; border-radius:15px 15px 0 0; padding:10px; box-shadow:0 -4px 20px rgba(0,0,0,0.3); display:none; max-height:50vh; overflow-y:auto; z-index:999; display:flex; justify-content:center;}  
.order-inner {width:100%; max-width:500px; padding:0 10px;}   
.category {background:#a66a3f; color:white; padding:10px; border-radius:8px; margin:15px 0 10px; display:flex; justify-content:space-between; cursor:pointer;}
.item {display:grid; grid-template-columns:1fr auto; padding:10px 0; border-bottom:1px solid #eee;} 
.name {display:flex; justify-content:space-between; margin-right:10px;}
.price {color:#d4af37;}    
.controls {display:flex; gap:6px;}
.controls button {padding:6px 8px; font-size:0.9em; border:none; border-radius:8px; background:#d32f2f; color:white;}
.controls input {width:50px; text-align:center;}
.hidden {display:none;}
.arrow {transition:0.2s;}
.rotate {transform: rotate(180deg);}
.order-item {display:flex; align-items:center; margin:4px 0;}
.order-item span:first-child{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.order-item span:last-child{flex-shrink:0; margin-left:10px;}
.delete-btn{margin-left:8px; background:#888; color:#fff; border:none; border-radius:6px; padding:2px 6px; cursor:pointer; font-size:0.8em;}
</style>
</head>

<body>
<header>
<h1>南雅西點餐系統</h1>
<div id="versionText" class="version"></div>
</header>

<main>
<div class="container">
<button class="main-btn" onclick="showMenu()">八方雲集</button>

<div class="menu" id="menu">

<div class="category" onclick="toggleCategory('cat1',this)">鍋貼類 <span class="arrow">▼</span></div>
<div id="cat1"></div>

<div class="category" onclick="toggleCategory('cat2',this)">水餃類 <span class="arrow">▼</span></div>
<div id="cat2"></div>

<div class="category" onclick="toggleCategory('cat3',this)">湯餃類 <span class="arrow">▼</span></div>
<div id="cat3"></div>

<div class="category" onclick="toggleCategory('cat4',this)">經典系列 <span class="arrow">▼</span></div>
<div id="cat4"></div>

<div class="category" onclick="toggleCategory('cat5',this)">乾麵類 <span class="arrow">▼</span></div>
<div id="cat5"></div>

<div class="category" onclick="toggleCategory('cat6',this)">湯麵類 <span class="arrow">▼</span></div>
<div id="cat6"></div>

<div class="category" onclick="toggleCategory('cat7',this)">炒手類 <span class="arrow">▼</span></div>
<div id="cat7"></div>

<div class="category" onclick="toggleCategory('cat8',this)">湯品類 <span class="arrow">▼</span></div>
<div id="cat8"></div>

<div class="category" onclick="toggleCategory('cat9',this)">飲品類 <span class="arrow">▼</span></div>
<div id="cat9"></div>

<div class="category" onclick="toggleCategory('cat10',this)">小菜類 <span class="arrow">▼</span></div>
<div id="cat10"></div>

</div>

<div class="order">
<div class="order-inner">
<h3>目前訂單</h3>
<div id="orderList"></div>
<div>總計：$<span id="total">0</span></div>
</div>
</div>

</div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
function safe(fn){try{fn()}catch(e){console.error(e)}}

const firebaseConfig={apiKey:"AIzaSyDcKUiZ2FHXG6oEzJsK9D2XhnqpHspTE_c",authDomain:"wt-eat.firebaseapp.com",projectId:"wt-eat"}
firebase.initializeApp(firebaseConfig)
const db=firebase.firestore();

// ✅ 開啟離線快取（多人同步更穩）
// ❌ 關閉 persistence（避免多裝置鎖死）
// try{ db.enablePersistence({synchronizeTabs:true}); }catch(e){ console.warn('persistence fail',e);}

let userName=localStorage.getItem('userName')||('裝置_'+Math.floor(Math.random()*1000))
localStorage.setItem('userName',userName)

// ✅ 完整且唯一 menuData（已修正重複錯誤）
const menuData={
cat1:[{id:'g',name:'招牌鍋貼',price:7},{id:'h',name:'韭菜鍋貼',price:7},{id:'i',name:'韓式辣味鍋貼',price:7},{id:'j',name:'咖哩雞肉鍋貼',price:7},{id:'k',name:'玉米鍋貼',price:7},{id:'l',name:'新蔬食鍋貼',price:7.5}],
cat2:[{id:'m',name:'招牌水餃',price:7},{id:'n',name:'韭菜水餃',price:7},{id:'o',name:'韓式辣味水餃',price:7},{id:'p',name:'咖哩雞肉水餃',price:7},{id:'q',name:'玉米水餃',price:7},{id:'r',name:'新蔬食水餃',price:7.5},{id:'s',name:'鮮蝦水餃',price:10.5}],
cat3:[{id:'t',name:'酸辣湯餃(8顆)',price:90},{id:'u',name:'玉米湯餃(8顆)',price:90}],
cat4:[{id:'v',name:'紅燒牛肉麵',price:168},{id:'w',name:'清燉牛肉麵',price:168},{id:'x',name:'麻辣牛肉麵',price:178}],
cat5:[{id:'ah',name:'古早味乾麵',price:45},{id:'ai',name:'招牌乾麵',price:55},{id:'aj',name:'麻醬乾麵',price:55},{id:'ak',name:'紹辣乾麵',price:60}],
cat6:[{id:'al',name:'古早味湯麵',price:45},{id:'am',name:'酸辣湯麵',price:70},{id:'an',name:'珍珠餛飩麵',price:70},{id:'ao',name:'菜肉大餛飩麵',price:80},{id:'ap',name:'榨菜肉絲麵',price:80},{id:'aq',name:'紹辣珍珠餛飩麵',price:80},{id:'ar',name:'紹辣菜肉大餛飩麵',price:90}],
cat7:[{id:'as',name:'珍珠紅油炒手(小)',price:60},{id:'at',name:'珍珠和風炒手(小)',price:60},{id:'au',name:'菜肉紅油炒手(大)',price:75},{id:'av',name:'菜肉和風炒手(大)',price:75}],
cat8:[{id:'aw',name:'酸辣湯',price:35},{id:'ax',name:'玉米濃湯',price:35},{id:'ay',name:'旗魚花枝丸湯',price:35},{id:'az',name:'黃金湯',price:35},{id:'ba',name:'羅宋排骨湯',price:35},{id:'bb',name:'珍珠餛飩湯',price:50},{id:'bc',name:'菜肉大餛飩湯',price:60}],
cat9:[{id:'bd',name:'香濃豆漿',price:20},{id:'be',name:'香濃豆漿(無糖)',price:20},{id:'bf',name:'黑豆漿',price:20},{id:'bg',name:'紅茶',price:20},{id:'bh',name:'寒天紅茶',price:45}],
cat10:[{id:'bi',name:'滷蛋',price:15},{id:'bj',name:'皮蛋豆腐',price:45},{id:'bk',name:'家常小菜',price:40},{id:'bl',name:'小菜雙拼',price:40},{id:'bm',name:'柚香蘿蔔',price:40},{id:'bn',name:'黃金豆腐',price:35},{id:'bo',name:'燙青菜',price:35},{id:'bp',name:'燙蘿蔔',price:35},{id:'bq',name:'和風秋葵',price:35},{id:'br',name:'薄鹽毛豆',price:35},{id:'bs',name:'韓式泡菜',price:30},{id:'bt',name:'黃金泡菜',price:30},{id:'bu',name:'台式泡菜',price:30}]
}

const prices={},names={}

function renderMenu(){safe(()=>{
for(let cat in menuData){
const c=document.getElementById(cat); if(!c) continue; c.innerHTML=''
menuData[cat].forEach(i=>{
prices[i.id]=i.price; names[i.id]=i.name
c.innerHTML+=`<div class="item">
<div class="name"><span>${i.name}</span><span class="price">${i.price}元</span></div>
<div class="controls">
<button onclick="changeQty('${i.id}',-5)">-5</button>
<button onclick="changeQty('${i.id}',-1)">-1</button>
<input id="${i.id}" value="0" onchange="saveCart()">
<button onclick="changeQty('${i.id}',1)">+1</button>
<button onclick="changeQty('${i.id}',5)">+5</button>
</div></div>`
})}}
)}

function showMenu(){safe(()=>{
const m=document.getElementById('menu')
m.style.display=m.style.display==='block'?'none':'block'
})}

function toggleCategory(id,el){safe(()=>{
const all=['cat1','cat2','cat3','cat4','cat5','cat6','cat7','cat8','cat9','cat10']
all.forEach(sec=>{
const c=document.getElementById(sec)
const arrow=document.querySelector(`.category[onclick*="${sec}"] .arrow`)
if(sec===id){
const hidden=c.classList.contains('hidden')
c.classList.toggle('hidden')
if(arrow) arrow.classList.toggle('rotate',!hidden)
}else{
c.classList.add('hidden')
if(arrow) arrow.classList.remove('rotate')
}
})
})}

function changeQty(id,d){safe(()=>{
const el=document.getElementById(id)
el.value=Math.max(0,(parseInt(el.value)||0)+d)
saveCart()
})}

function removeItem(id){
  try{
    const el=document.getElementById(id)
    if(el){el.value=0}

    const field = userName + '.' + id;

    db.collection('orders').doc('main').update({
      [field]: firebase.firestore.FieldValue.delete()
    })
    .then(()=>{
      console.log('刪除成功', id);
    })
    .catch(err=>{
      console.error('刪除失敗', err);
    });

  }catch(e){
    console.error('removeItem錯誤',e);
  }
}

function saveCart(){
  try{
    let cart={}
    for(let k in prices){
      let el=document.getElementById(k);
      if(el && parseInt(el.value)>0){
        cart[k]=parseInt(el.value)
      }
    }

    console.log('寫入資料:',cart);

    db.collection('orders').doc('main').set({[userName]:cart},{merge:true})
      .then(()=>{
        console.log('寫入成功');
      })
      .catch(err=>{
        console.error('寫入失敗',err);
      });

  }catch(e){
    console.error('saveCart錯誤',e);
  }
}


// 🔥 即時訂單同步（最終穩定版）
function initRealtime(){
  // 🔥 確保文件存在（第一次一定建立）
  db.collection('orders').doc('main').set({init:true},{merge:true});

  
  db.collection('orders').doc('main').onSnapshot(doc=>{
    console.log('收到同步資料');{
    const data=doc.data()||{};
    let html='';
    let total=0;

    for(let user in data){
      let sub=0;
      html+=`<div style="margin-top:6px"><b>${user}</b></div>`;

      for(let k in data[user]){
        const qty=data[user][k];
        const price=prices[k]||0;
        const sum=qty*price;
        sub+=sum;
        total+=sum;

        if(user===userName){
          html+=`<div class="order-item">
            <span>${names[k]||k}</span>
            <span>$${sum}</span>
            <button class="delete-btn" onclick="removeItem('${k}')">刪除</button>
          </div>`;
        }else{
          html+=`<div class="order-item">
            <span>${names[k]||k}</span>
            <span>$${sum}</span>
          </div>`;
        }
      }

      html+=`<div style="text-align:right;font-weight:bold;margin-bottom:6px;">小計：$${sub}</div>`;
    }

    document.getElementById('orderList').innerHTML=html;
    document.getElementById('total').innerText=total;
    document.querySelector('.order').style.display = total>0 ? 'flex' : 'none';
  });
}


// 🔥 初始化（穩定版）
document.addEventListener('DOMContentLoaded',()=>{
  renderMenu();

  ['cat1','cat2','cat3','cat4','cat5','cat6','cat7','cat8','cat9','cat10']
    .forEach(id=>document.getElementById(id)?.classList.add('hidden'));

  // ✅ 確保 menuData 載入後才啟動同步
  setTimeout(()=>{
    initRealtime();
  },100);

  // 版本號
  const d=new Date();
  const ver=`Ver.${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  const el=document.getElementById('versionText');
  if(el) el.innerText=ver;
});
</script>
</body>
</html>
